<!DOCTYPE html>
<html>
<head>
  <title>Database Firebase</title>
</head>
<body>

<h2>Input Nama</h2>
<input type="text" id="nama">
<button onclick="simpan()">Simpan</button>

<ul id="list"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDfs59hRYtUtFG3dVMZ3aGTIm3FvvbDnx8",
    authDomain: "test-bf56f.firebaseapp.com",
    projectId: "test-bf56f",
    storageBucket: "test-bf56f.firebasestorage.app",
    messagingSenderId: "276624363412",
    appId: "1:276624363412:web:b232a9df7bf64e4edac981"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.simpan = async function () {
    let nama = document.getElementById("nama").value;

    await addDoc(collection(db, "siswa"), {
      nama: nama
    });

    tampil();
  };

  async function tampil() {
    const querySnapshot = await getDocs(collection(db, "siswa"));
    let list = document.getElementById("list");
    list.innerHTML = "";

    querySnapshot.forEach((doc) => {
      list.innerHTML += "<li>" + doc.data().nama + "</li>";
    });
  }

  tampil();
</script>

</body>
</html>
